<div class="welcome-container">
  <nav class="navbar">
    <span class="brand">🔐 MyApp</span>
    <button class="btn-logout" (click)="logout()">Esci</button>
  </nav>

  <main class="content">

    <!-- loading -->
    <div *ngIf="loading()" class="loading">
      <div class="spinner"></div>
      <p>Caricamento...</p>
    </div>

    <!-- user -->
    <div *ngIf="!loading() && user() as u" class="card">

      <div class="avatar">{{ getInitials() }}</div>

      <h1>
        Benvenuto, {{ u.firstName || u.username }}! 👋
      </h1>

      <p class="subtitle">Accesso effettuato con successo</p>

      <div class="info-grid">
        <div class="info-item">
          <span class="label">Username</span>
          <span class="value">{{ u.username }}</span>
        </div>

        <div class="info-item">
          <span class="label">Email</span>
          <span class="value">{{ u.email }}</span>
        </div>

        <div *ngIf="u.firstName" class="info-item">
          <span class="label">Nome</span>
          <span class="value">{{ u.firstName }} {{ u.lastName }}</span>
        </div>
      </div>

      <div class="badge">
        <span>✅ Autenticato via Keycloak</span>
      </div>

    </div>

    <!-- error -->
    <div *ngIf="error()" class="error-card">
      <p>{{ error() }}</p>
      <button class="btn-retry" (click)="userService.loadUser()">
        Riprova
      </button>
    </div>

  </main>
</div>
