<div class="login-container">
  <div class="card">
    <form (ngSubmit)="login()">

    <input [(ngModel)]="form.username" name="username" placeholder="Username">

    <input [(ngModel)]="form.password" name="password" type="password" placeholder="Password">

    <button type="submit">Accedi</button>

    </form>

    <div class="logo">🔐</div>
    <h1>Accedi</h1>
    <p>Verrai reindirizzato alla pagina di login sicura.</p>

    <button class="btn-primary" (click)="login()">
      Accedi con Keycloak
    </button>

    <div class="divider">oppure</div>

    <button class="btn-secondary" (click)="register()">
      Registrati
    </button>
  </div>
</div>
