<form (ngSubmit)="register()">

<input [(ngModel)]="form.username" name="username" placeholder="Username">

<input [(ngModel)]="form.email" name="email" placeholder="Email">

<input [(ngModel)]="form.firstName" name="firstName" placeholder="Nome">

<input [(ngModel)]="form.lastName" name="lastName" placeholder="Cognome">

<input [(ngModel)]="form.password" name="password" type="password" placeholder="Password">

<button type="submit">Registrati</button>

</form>
